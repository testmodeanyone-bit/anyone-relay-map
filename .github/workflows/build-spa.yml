name: build-spa

# Auto-rebuilds anyonemap-worker.js from index.html whenever the SPA source
# (or its build scripts / wrapper shell) changes. Commits the rebuilt worker
# back to main so Cloudflare can pick it up.
#
# Loop prevention:
#   - The 'paths' filter excludes anyonemap-worker.js itself, so the
#     auto-commit cannot re-trigger this workflow.
#   - The auto-commit message includes [skip ci] as belt-and-suspenders.
#
# Permissions: needs contents:write so the GITHUB_TOKEN can push back.

on:
  push:
    branches:
      - main
    paths:
      - 'index.html'
      - 'worker-shell.js'
      - 'scripts/extract-html.js'
      - 'scripts/build-worker.js'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          # Need the GITHUB_TOKEN-authenticated remote so we can push back
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run extract-html.js
        run: node scripts/extract-html.js

      - name: Run build-worker.js
        run: node scripts/build-worker.js

      - name: Check for rebuilt files
        id: check
        run: |
          if git diff --quiet -- anyonemap-worker.js worker-shell.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No changes to commit — build produced identical output."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Build produced changes:"
            git diff --stat -- anyonemap-worker.js worker-shell.js
          fi

      - name: Commit and push rebuilt worker
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add anyonemap-worker.js worker-shell.js
          git commit -m "build(ci): rebuild anyonemap-worker.js from index.html [skip ci]

          Auto-rebuilt by .github/workflows/build-spa.yml after a push that
          changed the SPA source or build scripts. WORKER_VERSION auto-bumped
          by scripts/build-worker.js."
          git push origin main
