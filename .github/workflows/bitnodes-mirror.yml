name: Mirror bitnodes.io snapshot

# Fetches Bitcoin node data and commits to data/bitnodes-snapshot.json.
#
# PRIMARY: bitnodes.io/api/v1/snapshots/latest/ (~22,000 nodes with geo)
# FALLBACK: DNS seeders + ip-api.com batch geolocation (~50-70 nodes with geo)
#
# The AnyoneMap Cloudflare Worker reads from raw.githubusercontent.com (this
# repo) instead of bitnodes.io directly.
#
# ‚îÄ‚îÄ‚îÄ 2026 FIX (what changed and why) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
#  1. CADENCE: cron was '*/30 * * * *' (48 runs/day). bitnodes.io rate-limits
#     unauthenticated callers to ~10/day per IP, and GitHub runners SHARE IPs
#     across projects ‚Äî so running 48x/day guaranteed 429s and forced the
#     fallback to fire almost every run. Now '0 */3 * * *' (8/day), under the
#     budget with headroom. Bitcoin node counts move slowly; 3h freshness is
#     fine, and the worker's own KV cache smooths the gaps.
#  2. PRIMARY RETRIES: the primary now retries up to 3x with backoff and treats
#     429 explicitly (longer sleep), so a single transient throttle/530 no
#     longer drops straight to the fallback.
#  3. FAIL-CLOSED FALLBACK: previously the DNS-seeder path committed a 100-node
#     latest_height:0 snapshot UNCONDITIONALLY, overwriting the last good
#     ~22k-node bitnodes snapshot. Downstream then flagged it as junk and the
#     /bitcoin panel showed "live feed unavailable". Now the fallback only runs
#     when there is NO recent (<24h) good bitnodes-sourced snapshot to preserve.
#     A transient bitnodes outage keeps the last real data live instead of
#     replacing it with seeder data the consumer rejects.
# ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ

on:
  schedule:
    - cron: '0 */3 * * *'   # 8x/day ‚Äî under bitnodes.io's ~10/day per-IP limit
  workflow_dispatch:

concurrency:
  group: bitnodes-mirror
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # ‚îÄ‚îÄ‚îÄ Inspect the snapshot already committed in the repo ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Used to decide whether the DNS-seeder fallback is allowed to replace it.
      - name: Inspect existing snapshot
        id: existing
        run: |
          if [ -f data/bitnodes-snapshot.json ]; then
            SRC=$(jq -r '.source // "unknown"' data/bitnodes-snapshot.json 2>/dev/null || echo unknown)
            TS=$(jq -r '.timestamp // 0'    data/bitnodes-snapshot.json 2>/dev/null || echo 0)
          else
            SRC="none"; TS=0
          fi
          echo "Existing snapshot: source=$SRC ts=$TS"
          echo "source=$SRC" >> "$GITHUB_OUTPUT"
          echo "ts=$TS"      >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ‚îÄ PRIMARY: bitnodes.io (with retries + 429 handling) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Try bitnodes.io (primary)
        id: bitnodes
        run: |
          set -uo pipefail
          echo "Attempting bitnodes.io..."
          ATTEMPTS=3
          STATUS="000"
          for i in $(seq 1 "$ATTEMPTS"); do
            STATUS=$(curl -sS -o /tmp/bitnodes-raw.json -w '%{http_code}' \
              -A 'AnyoneMap-Mirror/1.0 (+https://github.com/testmodeanyone-bit/anyone-relay-map)' \
              -H 'Accept: application/json' \
              --connect-timeout 15 \
              --max-time 60 \
              'https://bitnodes.io/api/v1/snapshots/latest/' 2>/dev/null || echo "000")
            echo "Attempt $i/$ATTEMPTS: HTTP $STATUS"
            [ "$STATUS" = "200" ] && break
            if [ "$STATUS" = "429" ]; then
              echo "::warning::bitnodes.io rate-limited (429) on attempt $i"
              sleep 30
            elif [ "$i" -lt "$ATTEMPTS" ]; then
              sleep 10
            fi
          done

          if [ "$STATUS" != "200" ]; then
            echo "::warning::bitnodes.io unavailable after $ATTEMPTS attempts (last status: $STATUS)"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate response shape
          if ! jq -e '.timestamp and .nodes and .total_nodes' /tmp/bitnodes-raw.json > /dev/null 2>&1; then
            echo "::warning::bitnodes.io returned invalid JSON shape"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          NODE_COUNT=$(jq '.nodes | length' /tmp/bitnodes-raw.json)
          if [ "$NODE_COUNT" -lt 1000 ]; then
            echo "::warning::bitnodes.io returned only $NODE_COUNT nodes ‚Äî looks broken"
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TOTAL=$(jq '.total_nodes' /tmp/bitnodes-raw.json)
          TS=$(jq '.timestamp' /tmp/bitnodes-raw.json)
          echo "bitnodes.io OK: $NODE_COUNT nodes, total_nodes=$TOTAL, ts=$TS"
          echo "ok=true"           >> "$GITHUB_OUTPUT"
          echo "source=bitnodes"   >> "$GITHUB_OUTPUT"
          cp /tmp/bitnodes-raw.json /tmp/snapshot.json

      # ‚îÄ‚îÄ‚îÄ Decide whether the fallback may run ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      # Fail-closed: if we already have a fresh (<24h) bitnodes-sourced
      # snapshot, DO NOT replace it with DNS-seeder data on a transient miss.
      - name: Decide fallback
        id: decide
        if: steps.bitnodes.outputs.ok != 'true'
        run: |
          set -uo pipefail
          NOW=$(date +%s)
          PREV_SRC="${{ steps.existing.outputs.source }}"
          PREV_TS="${{ steps.existing.outputs.ts }}"
          AGE=$(( NOW - PREV_TS ))
          if [ "$PREV_SRC" = "bitnodes" ] && [ "$PREV_TS" -gt 0 ] && [ "$AGE" -lt 86400 ]; then
            echo "Last-good bitnodes snapshot is ${AGE}s old (<24h). Preserving it; skipping DNS fallback."
            echo "run_fallback=false" >> "$GITHUB_OUTPUT"
          else
            echo "No fresh bitnodes snapshot to preserve (source=$PREV_SRC, age=${AGE}s). DNS fallback allowed."
            echo "run_fallback=true" >> "$GITHUB_OUTPUT"
          fi

      # ‚îÄ‚îÄ‚îÄ FALLBACK: DNS seeders + ip-api.com batch geo ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Fallback to DNS seeders + geolocation
        id: fallback
        if: steps.bitnodes.outputs.ok != 'true' && steps.decide.outputs.run_fallback == 'true'
        run: |
          set -e
          echo "bitnodes.io unavailable and no fresh snapshot to preserve ‚Äî falling back to DNS seeders"

          SEEDERS=(
            "seed.bitcoin.sipa.be"
            "dnsseed.bluematt.me"
            "seed.bitcoinstats.com"
            "seed.bitcoin.jonasschnelli.ch"
            "seed.btc.petertodd.net"
            "seed.bitcoin.sprovoost.nl"
          )

          > /tmp/all-ips.txt
          for seeder in "${SEEDERS[@]}"; do
            echo "Querying $seeder..."
            dig +short +time=5 +tries=1 A "$seeder" >> /tmp/all-ips.txt 2>/dev/null || true
            dig +short +time=5 +tries=1 A "$seeder" >> /tmp/all-ips.txt 2>/dev/null || true
          done

          grep -oE '^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$' /tmp/all-ips.txt | sort -u > /tmp/unique-ips.txt
          IP_COUNT=$(wc -l < /tmp/unique-ips.txt)
          echo "Got $IP_COUNT unique IPs from DNS seeders"

          if [ "$IP_COUNT" -lt 10 ]; then
            echo "::error::DNS seeders returned only $IP_COUNT IPs ‚Äî not enough for a useful snapshot"
            exit 1
          fi

          head -100 /tmp/unique-ips.txt > /tmp/batch-ips.txt
          BATCH_COUNT=$(wc -l < /tmp/batch-ips.txt)
          echo "Batch geo-lookup for $BATCH_COUNT IPs via ip-api.com..."

          jq -R -s '
            split("\n") | map(select(length > 0)) |
            map({
              query: .,
              fields: "status,query,country,countryCode,city,lat,lon,org,as,isp"
            })
          ' /tmp/batch-ips.txt > /tmp/batch-request.json

          GEO_STATUS=$(curl -sS -o /tmp/geo-response.json -w '%{http_code}' \
            -X POST \
            -H 'Content-Type: application/json' \
            --max-time 30 \
            -d @/tmp/batch-request.json \
            'http://ip-api.com/batch')

          echo "ip-api.com status: $GEO_STATUS"
          if [ "$GEO_STATUS" != "200" ]; then
            echo "::error::ip-api.com returned HTTP $GEO_STATUS"
            exit 1
          fi
          if ! jq -e 'type == "array"' /tmp/geo-response.json > /dev/null 2>&1; then
            echo "::error::ip-api.com returned invalid JSON"
            exit 1
          fi

          SUCCESS_COUNT=$(jq '[.[] | select(.status == "success")] | length' /tmp/geo-response.json)
          echo "Successfully geolocated $SUCCESS_COUNT IPs"
          if [ "$SUCCESS_COUNT" -lt 10 ]; then
            echo "::error::Only $SUCCESS_COUNT IPs geolocated ‚Äî not enough"
            exit 1
          fi

          NOW=$(date +%s)
          jq --argjson now "$NOW" --argjson total "$SUCCESS_COUNT" '
            [.[] | select(.status == "success")] |
            {
              timestamp: $now,
              total_nodes: $total,
              latest_height: 0,
              source: "dns-seeders",
              nodes: (
                reduce .[] as $n ({};
                  . + {
                    ($n.query + ":8333"): [
                      70016,
                      "/Satoshi:unknown/",
                      $now,
                      1033,
                      0,
                      $n.query,
                      8333,
                      $n.countryCode,
                      $n.lat,
                      $n.lon,
                      0,
                      0,
                      ($n.org // $n.isp // ""),
                      ($n.city // "")
                    ]
                  }
                )
              )
            }
          ' /tmp/geo-response.json > /tmp/snapshot.json

          FINAL_NODES=$(jq '.nodes | length' /tmp/snapshot.json)
          echo "Built snapshot with $FINAL_NODES geolocated nodes from DNS seeders"
          echo "ok=true"            >> "$GITHUB_OUTPUT"
          echo "source=dns-seeders" >> "$GITHUB_OUTPUT"

      # ‚îÄ‚îÄ‚îÄ COMMIT ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Move snapshot into place
        if: steps.bitnodes.outputs.ok == 'true' || steps.fallback.outputs.ok == 'true'
        run: |
          mkdir -p data
          cp /tmp/snapshot.json data/bitnodes-snapshot.json

      - name: Commit if changed
        if: steps.bitnodes.outputs.ok == 'true' || steps.fallback.outputs.ok == 'true'
        run: |
          set -e
          SOURCE="${{ steps.bitnodes.outputs.source || steps.fallback.outputs.source }}"
          git config user.name 'bitnodes-mirror-bot'
          git config user.email 'bitnodes-mirror-bot@users.noreply.github.com'
          git add data/bitnodes-snapshot.json
          if git diff --staged --quiet; then
            echo "No changes ‚Äî skipping commit"
            exit 0
          fi
          TS=$(jq '.timestamp' data/bitnodes-snapshot.json)
          NODES=$(jq '.nodes | length' data/bitnodes-snapshot.json)
          TOTAL=$(jq '.total_nodes' data/bitnodes-snapshot.json)
          git commit -m "Mirror snapshot ts=$TS nodes=$NODES total=$TOTAL source=$SOURCE"
          git push

      # ‚îÄ‚îÄ‚îÄ Preserved last-good (no usable new data this run) ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ‚îÄ
      - name: Report preserved snapshot
        if: steps.bitnodes.outputs.ok != 'true' && steps.fallback.outputs.ok != 'true'
        run: |
          if [ "${{ steps.decide.outputs.run_fallback }}" = "false" ]; then
            echo "::notice::bitnodes.io missed this run; preserved fresh last-good snapshot (source=${{ steps.existing.outputs.source }})."
          else
            echo "::warning::Both bitnodes.io and DNS seeder fallback failed. Last-good snapshot preserved."
          fi
