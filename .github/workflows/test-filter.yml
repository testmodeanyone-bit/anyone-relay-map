name: test-filter

# Runs the quarantine-filter test suite (scripts/test-filter.js) whenever the
# proxy worker or the test itself changes. The test extracts applyQuarantineFilter
# and its centroid blocklists directly from anyclip-proxy-worker.js and asserts
# on their behaviour, so it catches coordinate edits, logic changes, or a broken
# epsilon before they reach production.
#
# No build, no push-back, no secrets — just runs node and reports pass/fail.

on:
  push:
    branches:
      - main
    paths:
      - 'anyclip-proxy-worker.js'
      - 'scripts/test-filter.js'
  pull_request:
    paths:
      - 'anyclip-proxy-worker.js'
      - 'scripts/test-filter.js'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run quarantine filter tests
        run: node scripts/test-filter.js
